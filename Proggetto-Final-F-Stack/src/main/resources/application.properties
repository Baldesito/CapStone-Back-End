spring.application.name=Proggetto-final-f-stack

# Profilo attivo
spring.profiles.active=dev

# Configurazione di base per il database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/proggetto_finale_f_s?currentSchema=public}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Ottimizzazione pool di connessioni
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true


# JWT Configuration
# IMPORTANT: JWT_SECRET environment variable MUST be set (minimum 32 characters)
jwt.secret=${JWT_SECRET}
jwt.expiration=864000000

# Disable open-in-view to avoid lazy loading issues and improve performance
spring.jpa.open-in-view=false

